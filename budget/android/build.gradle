buildscript {
    ext.kotlin_version = '1.9.0'
    repositories {
        google()
        jcenter()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath 'com.google.gms:google-services:4.3.14'
    }
}

allprojects {
    repositories {
        google()
        jcenter()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(':app')

    // AGP 8+ requires namespace. Some third-party plugins still rely on manifest package.
    def ensureNamespace = {
        def androidExt = project.extensions.findByName("android")
        if (androidExt == null || !androidExt.hasProperty("namespace")) {
            return
        }

        def currentNamespace = androidExt.namespace
        if (currentNamespace != null && currentNamespace.toString().trim()) {
            return
        }

        def manifestFile = project.file("src/main/AndroidManifest.xml")
        if (manifestFile.exists()) {
            def manifestText = manifestFile.getText("UTF-8")
            def matcher = manifestText =~ /package\s*=\s*"([^"]+)"/
            if (matcher.find()) {
                androidExt.namespace = matcher.group(1)
                return
            }
        }

        def fallbackGroup = project.group?.toString()
        if (fallbackGroup && fallbackGroup != "unspecified") {
            androidExt.namespace = fallbackGroup
            return
        }

        // Last fallback for old plugins without namespace/package/group.
        def sanitizedName = project.name.replaceAll(/[^A-Za-z0-9_.]/, "_")
        if (sanitizedName ==~ /^[0-9].*/) {
            sanitizedName = "x${sanitizedName}"
        }
        androidExt.namespace = "dev.cashew.${sanitizedName}"
    }

    // Keep Kotlin/Java target aligned across third-party plugins on AGP 8+.
    def ensureKotlinJvmTarget = {
        def androidExt = project.extensions.findByName("android")
        if (androidExt != null && androidExt.hasProperty("compileOptions")) {
            androidExt.compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }

        project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            kotlinOptions {
                jvmTarget = "17"
            }
        }
    }

    project.pluginManager.withPlugin("com.android.application") { ensureNamespace() }
    project.pluginManager.withPlugin("com.android.library") { ensureNamespace() }
    project.pluginManager.withPlugin("org.jetbrains.kotlin.android") { ensureKotlinJvmTarget() }
    project.pluginManager.withPlugin("kotlin-android") { ensureKotlinJvmTarget() }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
