name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: budget

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosheep/flutter-action@v2
        with:
          channel: stable

      # If you have your own keystore, set KEYSTORE_BASE64 / KEY_ALIAS / KEY_PASSWORD / STORE_PASSWORD secrets.
      # Otherwise, a temporary keystore is auto-generated for CI builds.
      - name: Decode keystore (from secrets)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/cashew-release.jks

      - name: Generate keystore (auto, no secrets)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          keytool -genkey -v \
            -keystore android/app/cashew-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias cashew \
            -dname "CN=Cashew CI, OU=Dev, O=Cashew, L=Beijing, ST=Beijing, C=CN" \
            -storepass cashew123456 \
            -keypass cashew123456

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'PROPS'
          storePassword=${{ secrets.STORE_PASSWORD != '' && secrets.STORE_PASSWORD || 'cashew123456' }}
          keyPassword=${{ secrets.KEY_PASSWORD != '' && secrets.KEY_PASSWORD || 'cashew123456' }}
          keyAlias=${{ secrets.KEY_ALIAS != '' && secrets.KEY_ALIAS || 'cashew' }}
          storeFile=app/cashew-release.jks
          PROPS

      - name: Decode google-services.json (from secrets)
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cashew-release-apk
          path: budget/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
