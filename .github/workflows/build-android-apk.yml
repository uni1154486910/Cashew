name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
      HAS_GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
    defaults:
      run:
        working-directory: budget

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable

      - name: Decode keystore (from secrets)
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/cashew-release.jks

      - name: Generate keystore (auto, no secrets)
        if: env.HAS_KEYSTORE != 'true'
        run: |
          keytool -genkey -v \
            -keystore android/app/cashew-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias cashew \
            -dname "CN=Cashew CI, OU=Dev, O=Cashew, L=Beijing, ST=Beijing, C=CN" \
            -storepass cashew123456 \
            -keypass cashew123456

      - name: Create key.properties (from secrets)
        if: env.HAS_KEYSTORE == 'true'
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=cashew-release.jks\n' \
            '${{ secrets.STORE_PASSWORD }}' \
            '${{ secrets.KEY_PASSWORD }}' \
            '${{ secrets.KEY_ALIAS }}' \
            > android/key.properties

      - name: Create key.properties (auto)
        if: env.HAS_KEYSTORE != 'true'
        run: |
          printf 'storePassword=cashew123456\nkeyPassword=cashew123456\nkeyAlias=cashew\nstoreFile=cashew-release.jks\n' \
            > android/key.properties

      - name: Decode google-services.json (from secrets)
        if: env.HAS_GOOGLE_SERVICES == 'true'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cashew-release-apk
          path: budget/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
